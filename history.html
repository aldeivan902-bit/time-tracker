<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Team Time Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        body.dark {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        body.dark .card { background: #2d2d2d; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { margin-bottom: 20px; }
        .entry {
            border-bottom: 1px solid #ddd;
            padding: 15px;
            cursor: pointer;
        }
        .entry:hover { background: rgba(0,0,0,0.05); }
        .entry-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .date { font-weight: bold; font-size: 18px; }
        .status { font-size: 14px; }
        .status-completed { color: #28a745; }
        .status-active { color: #ffc107; }
        .edit-form {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            display: none;
        }
        .edit-form.active { display: block; }
        .edit-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        .edit-row label { font-size: 12px; display: block; }
        .edit-row input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-save { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        .nav-link {
            display: inline-block;
            margin-top: 10px;
            color: #007bff;
            text-decoration: none;
        }
        .month-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-small { padding: 5px 10px; background: #6c757d; color: white; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error-box {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        body.dark .error-box {
            background: #3a2a00;
            color: #ffc107;
        }
        @media (max-width: 600px) {
            .edit-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📜 Time History</h1>
            <div class="month-selector">
                <button class="btn-small" onclick="changeMonth(-1)">← Previous</button>
                <span id="monthDisplay" style="font-weight: bold; font-size: 18px;"></span>
                <button class="btn-small" onclick="changeMonth(1)">Next →</button>
                <button class="btn-small" onclick="loadHistory()">🔄 Refresh</button>
            </div>
            <div id="historyList">
                <div class="loading">⏳ Loading your history...</div>
            </div>
            <a href="index.html" class="nav-link">← Back to Dashboard</a>
        </div>
    </div>
    
    <div id="forgotModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; max-width: 400px; margin: 20px; padding: 20px; border-radius: 16px;">
            <h3>⚠️ Forgot to Clock Out?</h3>
            <div id="forgotContent"></div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button onclick="fixForgotClockOut()" class="btn-save" style="flex: 1;">✓ Set 5:00 PM</button>
                <button onclick="closeForgotModal()" class="btn-cancel" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // ============================================
        // HISTORY PAGE - Uses supabaseClient from app.js
        // ============================================
        
        let currentMonth = new Date().toISOString().slice(0, 7);
        let forgotEntry = null;
        let isLoading = false;
        
        // getToday() - local version using local time
        function getTodayLocal() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // Get month start and end dates for filtering
        function getMonthRange(monthStr) {
            const [year, month] = monthStr.split('-').map(Number);
            const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
            const endDate = `${year}-${String(month).padStart(2, '0')}-${String(new Date(year, month, 0).getDate()).padStart(2, '0')}`;
            return { startDate, endDate };
        }
        
        async function loadHistory() {
            if (isLoading) return;
            
            // Check if currentUser exists (from app.js)
            if (typeof currentUser === 'undefined' || !currentUser) {
                document.getElementById('historyList').innerHTML = '<div class="error-box">⚠️ Please go back to the dashboard and set your name first.</div>';
                return;
            }
            
            // Check if supabaseClient exists
            if (typeof supabaseClient === 'undefined') {
                document.getElementById('historyList').innerHTML = '<div class="error-box">❌ Error: Database connection not available.</div>';
                return;
            }
            
            isLoading = true;
            document.getElementById('historyList').innerHTML = '<div class="loading">⏳ Loading your history...</div>';
            
            try {
                const monthDisplay = document.getElementById('monthDisplay');
                if (monthDisplay) monthDisplay.innerText = currentMonth;
                
                const { startDate, endDate } = getMonthRange(currentMonth);
                
                console.log('Loading history for:', currentUser, 'from', startDate, 'to', endDate);
                
                // FIXED: Use gte and lte instead of like for date filtering
                const { data, error } = await supabaseClient
                    .from('time_entries')
                    .select('*')
                    .eq('user_name', currentUser)
                    .gte('date', startDate)
                    .lte('date', endDate)
                    .order('date', { ascending: false });
                
                if (error) {
                    console.error('Error loading history:', error);
                    document.getElementById('historyList').innerHTML = `
                        <div class="error-box">❌ Error loading data: ${error.message}</div>
                    `;
                    isLoading = false;
                    return;
                }
                
                if (!data || data.length === 0) {
                    document.getElementById('historyList').innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #999;">
                            📭 No entries for ${currentMonth}.<br>
                            <small>Start tracking your time by clicking "Clock In" on the dashboard!</small>
                        </div>
                    `;
                    isLoading = false;
                    return;
                }
                
                let html = '';
                let totalWorkedMinutes = 0;
                let totalOvertimeMinutes = 0;
                
                for (const entry of data) {
                    const status = entry.clock_out ? 'completed' : (entry.clock_in ? 'active' : 'pending');
                    const statusText = status === 'completed' ? '✓ Completed' : (status === 'active' ? '🟡 In Progress' : '⚪ Not started');
                    const statusClass = status === 'completed' ? 'status-completed' : 'status-active';
                    
                    const workedDisplay = (entry.worked_minutes !== null && entry.worked_minutes !== undefined) 
                        ? formatMinutes(entry.worked_minutes) 
                        : 'calculating...';
                    
                    // Accumulate totals
                    if (entry.worked_minutes) totalWorkedMinutes += entry.worked_minutes;
                    if (entry.overtime_minutes) totalOvertimeMinutes += entry.overtime_minutes;
                    
                    const dateDisplay = formatDate(entry.date);
                    
                    html += `
                        <div class="entry" onclick="toggleEdit(${entry.id})">
                            <div class="entry-header">
                                <span class="date">📅 ${dateDisplay}</span>
                                <span class="status ${statusClass}">${statusText}</span>
                            </div>
                            <div>⏰ Clock In: ${entry.clock_in || '—'} | Clock Out: ${entry.clock_out || '—'}</div>
                            <div>🍽️ Break: ${entry.break_start || '—'} to ${entry.break_end || '—'}</div>
                            ${entry.clock_out ? `<div>📊 Worked: ${workedDisplay} | 🟡 Overtime: ${formatMinutes(entry.overtime_minutes || 0)}</div>` : ''}
                            <div id="edit-${entry.id}" class="edit-form">
                                <div class="edit-row">
                                    <div><label>Clock In</label><input type="time" id="clock_in_${entry.id}" value="${entry.clock_in || ''}" step="1"></div>
                                    <div><label>Break Start</label><input type="time" id="break_start_${entry.id}" value="${entry.break_start || ''}" step="1"></div>
                                    <div><label>Break End</label><input type="time" id="break_end_${entry.id}" value="${entry.break_end || ''}" step="1"></div>
                                    <div><label>Clock Out</label><input type="time" id="clock_out_${entry.id}" value="${entry.clock_out || ''}" step="1"></div>
                                </div>
                                <button onclick="event.stopPropagation(); saveEdit(${entry.id})" class="btn-save">💾 Save Changes</button>
                                <button onclick="event.stopPropagation(); toggleEdit(${entry.id})" class="btn-cancel">Cancel</button>
                            </div>
                        </div>
                    `;
                }
                
                // Add monthly summary at the top
                const summaryHtml = `
                    <div style="background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-around; flex-wrap: wrap;">
                        <div><strong>📊 Month Summary</strong></div>
                        <div>Days: <strong>${data.length}</strong></div>
                        <div>Total Hours: <strong>${formatMinutes(totalWorkedMinutes)}</strong></div>
                        <div>Total Overtime: <strong>${formatMinutes(totalOvertimeMinutes)}</strong></div>
                    </div>
                `;
                
                document.getElementById('historyList').innerHTML = summaryHtml + html;
                
                // Check for forgotten clock outs
                await checkForForgotClockOut();
                
            } catch (err) {
                console.error('Error:', err);
                document.getElementById('historyList').innerHTML = `
                    <div class="error-box">❌ Error loading data: ${err.message}</div>
                `;
            }
            
            isLoading = false;
        }
        
        function toggleEdit(id) {
            const editDiv = document.getElementById(`edit-${id}`);
            if (editDiv) {
                editDiv.classList.toggle('active');
            }
        }
        
        async function saveEdit(id) {
            const clockIn = document.getElementById(`clock_in_${id}`).value;
            const breakStart = document.getElementById(`break_start_${id}`).value;
            const breakEnd = document.getElementById(`break_end_${id}`).value;
            const clockOut = document.getElementById(`clock_out_${id}`).value;
            
            const updates = {};
            if (clockIn) updates.clock_in = clockIn + ':00';
            if (breakStart) updates.break_start = breakStart + ':00';
            if (breakEnd) updates.break_end = breakEnd + ':00';
            if (clockOut) updates.clock_out = clockOut + ':00';
            updates.last_modified = new Date().toISOString();
            
            try {
                const { error } = await supabaseClient
                    .from('time_entries')
                    .update(updates)
                    .eq('id', id);
                
                if (error) {
                    alert('❌ Error saving: ' + error.message);
                    return;
                }
                
                // Get the date for this entry to recalculate
                const { data } = await supabaseClient
                    .from('time_entries')
                    .select('user_name, date')
                    .eq('id', id)
                    .single();
                
                if (data) {
                    // Recalculate hours
                    await updateCalculations(data.user_name, data.date);
                }
                
                alert('✅ Changes saved successfully!');
                loadHistory();
                if (typeof updateAll === 'function') updateAll();
                
            } catch (err) {
                alert('❌ Error: ' + err.message);
            }
        }
        
        async function checkForForgotClockOut() {
            try {
                const { data, error } = await supabaseClient
                    .from('time_entries')
                    .select('*')
                    .eq('user_name', currentUser)
                    .is('clock_out', null)
                    .not('clock_in', 'is', null)
                    .lt('date', getTodayLocal());
                
                if (error) {
                    console.error('Error checking for forgotten clock outs:', error);
                    return;
                }
                
                if (data && data.length > 0) {
                    forgotEntry = data[0];
                    const forgotDate = formatDate(forgotEntry.date);
                    document.getElementById('forgotContent').innerHTML = `
                        <p>📅 On ${forgotDate}, you clocked in at ${forgotEntry.clock_in} but never clocked out.</p>
                        <p>Would you like to set a clock out time?</p>
                    `;
                    document.getElementById('forgotModal').style.display = 'flex';
                }
            } catch (err) {
                console.error('Error:', err);
            }
        }
        
        async function fixForgotClockOut() {
            if (!forgotEntry) return;
            
            const defaultEnd = '17:00:00';
            try {
                const { error } = await supabaseClient
                    .from('time_entries')
                    .update({ clock_out: defaultEnd, last_modified: new Date().toISOString() })
                    .eq('id', forgotEntry.id);
                
                if (error) {
                    alert('❌ Error: ' + error.message);
                    return;
                }
                
                await updateCalculations(forgotEntry.user_name, forgotEntry.date);
                alert(`✅ Clock out set to 5:00 PM for ${formatDate(forgotEntry.date)}`);
                closeForgotModal();
                loadHistory();
                if (typeof updateAll === 'function') updateAll();
                
            } catch (err) {
                alert('❌ Error: ' + err.message);
            }
        }
        
        function closeForgotModal() {
            document.getElementById('forgotModal').style.display = 'none';
            forgotEntry = null;
        }
        
        function changeMonth(delta) {
            const [year, month] = currentMonth.split('-');
            let newDate = new Date(parseInt(year), parseInt(month) - 1 + delta, 1);
            currentMonth = `${newDate.getFullYear()}-${String(newDate.getMonth() + 1).padStart(2, '0')}`;
            loadHistory();
        }
        
        // Load dark mode setting
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
        }
        
        // Initial load
        window.onload = function() {
            // Check if currentUser is available from app.js
            if (typeof currentUser !== 'undefined' && currentUser) {
                loadHistory();
            } else {
                document.getElementById('historyList').innerHTML = `
                    <div class="error-box">⚠️ Please go to the dashboard and set your name first.</div>
                `;
            }
        };
    </script>
</body>
</html>
